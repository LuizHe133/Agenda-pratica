<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Agenda de Contatos</h1>

      <form id="form-contato" class="card">
        <input type="text" id="nome" placeholder="Nome" required />
        <input type="text" id="telefone" placeholder="Telefone" required />
        <input type="email" id="email" placeholder="E-mail" />
        <input type="date" id="data" />
        <button id="btn-salvar" type="button">Salvar</button>
      </form>

      <section class="card">
        <h2>Contatos cadastrados</h2>
        <ul id="lista-contatos"></ul>
      </section>
    </main>

    <script>
      const form = document.getElementById('form-contato');
      const botaoSalvar = document.getElementById('btn-salvar');
      const lista = document.getElementById('lista-contatos');
      let contatos = [];

      async function carregarContatos() {
        try {
          const resposta = await fetch('/api/contatos');
          if (!resposta.ok) {
            throw new Error('Não foi possível carregar os contatos.');
          }
          contatos = await resposta.json();
          renderizarContatos();
        } catch (erro) {
          console.error(erro);
          lista.innerHTML = '<li>Não foi possível carregar os contatos.</li>';
        }
      }

      function renderizarContatos() {
        lista.innerHTML = '';

        if (contatos.length === 0) {
          lista.innerHTML = '<li>Nenhum contato cadastrado.</li>';
          return;
        }

        contatos.forEach((contato) => {
          const item = document.createElement('li');
          item.innerHTML = `
            <strong>${contato.nome}</strong><br/>
            Telefone: ${contato.telefone}<br/>
            E-mail: ${contato.email || '-'}<br/>
            Data: ${contato.data || '-'}
            <button data-id="${contato.id}" class="remover">Remover</button>
          `;
          lista.appendChild(item);
        });
      }

      botaoSalvar.addEventListener('click', async (event) => {
        event.preventDefault();

        const dados = {
          nome: document.getElementById('nome').value.trim(),
          telefone: document.getElementById('telefone').value.trim(),
          email: document.getElementById('email').value.trim(),
          data: document.getElementById('data').value
        };

        if (!dados.nome || !dados.telefone) {
          lista.innerHTML = '<li>Preencha nome e telefone.</li>';
          return;
        }

        try {
          const resposta = await fetch('/api/contatos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
          });

          const resultado = await resposta.json().catch(() => ({}));

          if (!resposta.ok) {
            throw new Error(resultado.erro || 'Não foi possível salvar o contato.');
          }

          form.reset();
          contatos.unshift(resultado);
          renderizarContatos();
        } catch (erro) {
          console.error(erro);
          lista.innerHTML = `<li>${erro.message}</li>`;
        }
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const dados = {
          nome: document.getElementById('nome').value.trim(),
          telefone: document.getElementById('telefone').value.trim(),
          email: document.getElementById('email').value.trim(),
          data: document.getElementById('data').value
        };

        if (!dados.nome || !dados.telefone) {
          lista.innerHTML = '<li>Preencha nome e telefone.</li>';
          return;
        }

        try {
          const resposta = await fetch('/api/contatos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
          });

          const resultado = await resposta.json().catch(() => ({}));

          if (!resposta.ok) {
            throw new Error(resultado.erro || 'Não foi possível salvar o contato.');
          }

          form.reset();
          contatos.unshift(resultado);
          renderizarContatos();
        } catch (erro) {
          console.error(erro);
          lista.innerHTML = `<li>${erro.message}</li>`;
        }
      });

      lista.addEventListener('click', async (event) => {
        if (event.target.classList.contains('remover')) {
          const id = event.target.dataset.id;
          await fetch(`/api/contatos/${id}`, { method: 'DELETE' });
          carregarContatos();
        }
      });

      carregarContatos();
    </script>
  </body>
</html>
